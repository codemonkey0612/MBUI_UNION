<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHIme | 建築タイプ診断</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(180deg, #B8EDF5 0%, #8DDCEE 18%, #5BBFDF 42%, #3BA4CC 68%, #2A8CB8 100%);
    font-family: 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif;
    position: relative;
    overflow-x: hidden;
  }

  /* ── Animations ── */
  @keyframes floatUp {
    0%   { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-110vh) scale(0.3); opacity: 0; }
  }
  @keyframes swimAcross {
    0%   { transform: translateX(-60px) scaleX(1); opacity: 0.2; }
    48%  { opacity: 0.2; }
    49%  { transform: translateX(110vw) scaleX(1); opacity: 0; }
    50%  { transform: translateX(110vw) scaleX(-1); opacity: 0; }
    51%  { opacity: 0.2; }
    100% { transform: translateX(-60px) scaleX(-1); opacity: 0.2; }
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeSlideOut {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-24px); }
  }
  @keyframes pulseGlow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(255,240,100,.4)); }
    50%       { filter: drop-shadow(0 0 50px rgba(255,240,100,.75)); }
  }
  @keyframes wave {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  @keyframes reveal {
    from { opacity: 0; transform: translateY(40px) scale(.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes caustic {
    0%, 100% { opacity: .05; transform: scale(1) rotate(0deg); }
    50%       { opacity: .10; transform: scale(1.05) rotate(3deg); }
  }
  @keyframes archDraw {
    0%   { stroke-dashoffset: 1200; opacity: 0; }
    10%  { opacity: 1; }
    80%  { stroke-dashoffset: 0; opacity: .5; }
    100% { stroke-dashoffset: 0; opacity: 0; }
  }
  @keyframes archFade {
    0%   { opacity: 0; }
    15%  { opacity: .45; }
    80%  { opacity: .45; }
    100% { opacity: 0; }
  }

  /* ── Fixed decorations ── */
  #deco-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    animation: floatUp linear infinite;
  }
  .fish {
    position: absolute;
    animation: swimAcross linear infinite;
  }
  #arch-section-svg {
    position: absolute; left: -20px; top: 10%;
    animation: archFade 18s 2s ease-in-out infinite;
  }
  #arch-section-svg g {
    animation: archDraw 18s 2s ease-in-out infinite;
  }
  #arch-plan-svg {
    position: absolute; right: -30px; bottom: 12%;
    animation: archFade 22s 8s ease-in-out infinite;
  }
  #arch-plan-svg g {
    animation: archDraw 22s 8s ease-in-out infinite;
  }
  #north-mark { position: absolute; right: 8%; top: 25%; opacity: .1; }
  #dim-mark   { position: absolute; left: 5%; bottom: 30%; opacity: .12; }

  #caustic-overlay {
    position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse 80px 60px at 20% 30%, rgba(255,255,255,.08) 0%, transparent 70%),
      radial-gradient(ellipse 60px 80px at 70% 15%, rgba(255,255,255,.06) 0%, transparent 70%),
      radial-gradient(ellipse 100px 50px at 50% 60%, rgba(255,255,255,.05) 0%, transparent 70%),
      radial-gradient(ellipse 70px 90px at 85% 75%, rgba(255,255,255,.07) 0%, transparent 70%);
    animation: caustic 6s ease-in-out infinite;
    pointer-events: none; z-index: 0;
  }
  #wave1 {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 140px; overflow: hidden; z-index: 0; opacity: .28; pointer-events: none;
  }
  #wave1 svg { width: 200%; animation: wave 10s linear infinite; }
  #wave2 {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 90px; overflow: hidden; z-index: 0; opacity: .18; pointer-events: none;
  }
  #wave2 svg { width: 200%; animation: wave 16s linear infinite reverse; }

  /* ── Layout ── */
  #app { position: relative; z-index: 1; }

  .page {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 40px 20px 100px;
  }
  .page.quiz-page { justify-content: flex-start; padding-top: 32px; }

  .card-wrap { width: 100%; max-width: 600px; }

  /* ── Glass card ── */
  .glass {
    background: rgba(255,255,255,.55);
    border: 1px solid rgba(255,255,255,.75);
    border-radius: 24px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  .glass-light {
    background: rgba(255,255,255,.35);
    border: 1px solid rgba(255,255,255,.6);
    border-radius: 14px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  /* ── Intro ── */
  #intro-inner {
    text-align: center; max-width: 520px;
    animation: fadeSlideIn .8s ease forwards;
  }
  #intro-emoji { font-size: 80px; margin-bottom: 16px; filter: drop-shadow(0 0 24px rgba(100,200,240,.6)); }
  #intro-badge {
    font-size: 11px; letter-spacing: 6px; color: rgba(255,255,255,.85);
    text-transform: uppercase; margin-bottom: 16px; font-weight: 600;
  }
  #intro-title {
    font-size: clamp(28px,6vw,48px); font-weight: 800;
    background: linear-gradient(135deg,#fff 0%,#E8F8FF 40%,#FFE88A 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2; margin-bottom: 12px; letter-spacing: -1px;
  }
  #intro-sub {
    font-size: 13px; color: rgba(255,255,255,.75); letter-spacing: 4px;
    margin-bottom: 40px; text-transform: uppercase;
  }
  #intro-desc {
    font-size: 15px; color: #1a3a50; line-height: 1.9; margin-bottom: 48px;
    text-align: left; padding: 24px; border-radius: 16px;
    background: rgba(255,255,255,.55); border: 1px solid rgba(255,255,255,.7);
    backdrop-filter: blur(16px);
  }
  #intro-desc span { color: #0077B6; font-weight: 700; }
  #btn-start {
    background: linear-gradient(135deg,#FFD93D,#FF9500);
    border: none; border-radius: 50px;
    padding: 18px 56px; font-size: 16px; font-weight: 800;
    color: #1a2e40; letter-spacing: 2px; cursor: pointer;
    box-shadow: 0 8px 32px rgba(255,200,50,.4);
    transition: all .3s ease;
    font-family: inherit;
  }
  #btn-start:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,200,50,.55); }
  #intro-note { font-size: 12px; color: rgba(255,255,255,.6); margin-top: 24px; }

  /* ── Quiz ── */
  #quiz-header { width: 100%; max-width: 600px; margin-bottom: 32px; }
  #quiz-nav {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
  }
  #btn-back {
    background: none; border: none; font-size: 13px; letter-spacing: 1px;
    cursor: pointer; font-family: inherit; transition: color .2s;
    color: rgba(255,255,255,.5);
  }
  #btn-back:disabled { color: rgba(255,255,255,.2); cursor: default; }
  #quiz-counter { font-size: 13px; color: rgba(255,255,255,.4); letter-spacing: 2px; }
  #progress-track {
    height: 4px; background: rgba(255,255,255,.2); border-radius: 2px; overflow: hidden;
  }
  #progress-fill {
    height: 100%; background: linear-gradient(90deg,#FFD93D,#FF9500);
    transition: width .4s ease; box-shadow: 0 0 10px rgba(255,220,80,.8);
    width: 0%;
  }

  #question-card {
    animation: fadeSlideIn .4s ease forwards;
  }
  #question-card.slide-out {
    animation: fadeSlideOut .3s ease forwards;
  }

  .q-outer {
    padding: 40px 32px; margin-bottom: 20px;
  }
  #q-label { font-size: 11px; color: #0077B6; letter-spacing: 4px; margin-bottom: 32px; text-transform: uppercase; font-weight: 700; }

  .ab-card {
    border-radius: 16px; padding: 20px 24px; margin-bottom: 16px;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .ab-card.a-card {
    background: rgba(0,140,200,.1); border: 1px solid rgba(0,140,200,.25);
  }
  .ab-card.b-card {
    background: rgba(255,200,60,.1); border: 1px solid rgba(255,200,60,.25);
  }
  .ab-badge {
    width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .a-card .ab-badge { background: rgba(0,140,200,.2); color: #005f90; border: 1px solid rgba(0,140,200,.4); }
  .b-card .ab-badge { background: rgba(200,140,0,.15); color: #7a4500; border: 1px solid rgba(200,140,0,.35); }
  .ab-text { font-size: 14px; color: #1a3a50; line-height: 1.8; }

  .ab-divider { text-align: center; color: rgba(0,80,130,.3); font-size: 18px; margin: 4px 0; }

  .opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .opt-btn {
    padding: 16px 24px; border-radius: 14px; text-align: left;
    font-size: 14px; letter-spacing: .5px; cursor: pointer;
    display: flex; align-items: center; gap: 12px;
    transition: all .25s ease; font-family: inherit;
    background: rgba(255,255,255,.35); border: 1px solid rgba(255,255,255,.6);
    color: #1a3a50; font-weight: 400;
    backdrop-filter: blur(12px);
  }
  .opt-btn:hover { transform: translateX(4px); }
  .opt-btn.selected-a1 { background: rgba(255,255,255,.75); border-color: rgba(0,140,200,.6); color: #004d7a; font-weight: 700; box-shadow: 0 4px 20px rgba(0,140,200,.3); }
  .opt-btn.selected-a2 { background: rgba(255,255,255,.55); border-color: rgba(0,140,200,.35); color: #1a3a50; font-weight: 700; }
  .opt-btn.selected-b2 { background: rgba(255,255,255,.55); border-color: rgba(200,130,0,.35); color: #4a3000; font-weight: 700; }
  .opt-btn.selected-b1 { background: rgba(255,255,255,.75); border-color: rgba(200,140,0,.6); color: #4a3000; font-weight: 700; box-shadow: 0 4px 20px rgba(200,140,0,.3); }
  .opt-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    background: rgba(0,100,160,.3); transition: background .2s;
  }
  .opt-btn.selected-a1 .opt-dot,
  .opt-btn.selected-a2 .opt-dot { background: rgba(0,140,200,.6); }
  .opt-btn.selected-b1 .opt-dot,
  .opt-btn.selected-b2 .opt-dot { background: rgba(200,140,0,.6); }

  #btn-next {
    width: 100%; border: none; border-radius: 50px;
    padding: 18px; font-size: 15px; font-weight: 800; letter-spacing: 2px;
    cursor: pointer; transition: all .3s ease; font-family: inherit;
    background: rgba(255,255,255,.2); color: rgba(255,255,255,.35);
  }
  #btn-next.active {
    background: linear-gradient(135deg,#FFD93D,#FF9500); color: #003060;
    box-shadow: 0 8px 24px rgba(255,220,80,.5);
  }
  #btn-next.active:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(255,220,80,.6); }

  /* ── Result ── */
  #result-page { opacity: 0; transition: opacity .8s ease; }
  #result-page.visible { opacity: 1; }

  #result-header { text-align: center; margin-bottom: 32px; animation: reveal .7s ease forwards; }
  #result-arch-label { font-size: 11px; letter-spacing: 6px; color: rgba(255,255,255,.85); text-transform: uppercase; margin-bottom: 16px; font-weight: 600; }
  #result-emoji { width: 420px; height: 420px; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 180px; background: none; border: none; box-shadow: none; animation: none; overflow: visible; }
  .result-character-image { width: 360px; max-width: 100%; height: auto; object-fit: contain; display: block; filter: none; background: transparent; box-shadow: none; border: none; }
  #result-code-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,.6); border: 1px solid rgba(255,255,255,.8);
    border-radius: 50px; padding: 8px 24px; margin-bottom: 16px;
    backdrop-filter: blur(12px);
  }
  #result-code-badge span { font-size: 20px; font-weight: 800; color: #0077B6; letter-spacing: 4px; }
  #result-name {
    font-size: clamp(24px,5vw,36px); font-weight: 800;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 8px;
  }
  #result-en { font-size: 13px; color: rgba(255,255,255,.75); letter-spacing: 2px; margin-bottom: 16px; }
  #result-tagline {
    font-size: 16px; color: #1a3a50; font-weight: 600; line-height: 1.7;
    background: rgba(255,255,255,.6); border: 1px solid rgba(255,255,255,.8);
    border-radius: 12px; padding: 14px 20px; backdrop-filter: blur(16px);
  }

  .result-card { padding: 28px; margin-bottom: 16px; animation: reveal .7s ease both; }
  .result-label { font-size: 11px; letter-spacing: 4px; color: #0077B6; margin-bottom: 16px; font-weight: 700; }
  .result-text { font-size: 14px; color: #1a3a50; line-height: 1.9; }

  .sw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; animation: reveal .7s .2s ease both; }
  .sw-card { padding: 24px; backdrop-filter: blur(12px); border-radius: 20px; }
  .sw-card.strength-card { background: rgba(255,255,255,.55); border: 1px solid rgba(0,160,200,.3); }
  .sw-card.weakness-card { background: rgba(255,255,255,.55); border: 1px solid rgba(200,140,0,.25); }
  .sw-label-s { font-size: 11px; letter-spacing: 3px; color: #0077B6; margin-bottom: 16px; font-weight: 700; }
  .sw-label-w { font-size: 11px; letter-spacing: 3px; color: #B8860B; margin-bottom: 16px; font-weight: 700; }
  .sw-item { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
  .sw-item span:first-child { font-size: 10px; margin-top: 5px; flex-shrink: 0; }
  .sw-item-text { font-size: 13px; line-height: 1.5; }
  .strength-card .sw-item span:first-child { color: #0099CC; }
  .strength-card .sw-item-text { color: #1a3a50; }
  .weakness-card .sw-item span:first-child { color: #C8960C; }
  .weakness-card .sw-item-text { color: #3a2800; }

  .anecdote-item {
    font-size: 13px; color: #1a3a50; line-height: 1.7;
    padding: 8px 0; border-bottom: 1px solid rgba(0,80,130,.1);
  }
  .anecdote-item:last-child { border-bottom: none; }

  .career-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .career-tag {
    background: rgba(0,120,180,.12); border: 1px solid rgba(0,120,180,.3);
    border-radius: 50px; padding: 8px 16px;
    font-size: 12px; color: #005580; letter-spacing: .5px; font-weight: 600;
  }

  #btn-restart {
    width: 100%; background: rgba(255,255,255,.4); border: 1px solid rgba(255,255,255,.65);
    border-radius: 50px; padding: 18px; font-size: 14px; font-weight: 600;
    color: #1a3a50; cursor: pointer; letter-spacing: 2px;
    transition: background .3s ease; font-family: inherit;
    backdrop-filter: blur(8px);
  }
  #btn-restart:hover { background: rgba(255,255,255,.6); }

  /* responsive */
  @media (max-width: 480px) {
    .sw-grid { grid-template-columns: 1fr; }
    .q-outer { padding: 28px 20px; }
  }

  .axis-block { margin-top: 18px; }
  .axis-block:first-child { margin-top: 0; }
  .axis-title { font-size: 13px; letter-spacing: .08em; color: rgba(20,58,80,.72); margin-bottom: 8px; }
  .axis-bar { display: grid; grid-template-columns: 62px 1fr 62px; gap: 10px; align-items: center; }
  .axis-left, .axis-right { font-size: 11px; text-align: center; color: rgba(20,58,80,.72); }
  .axis-meter { position: relative; height: 10px; border-radius: 999px; background: rgba(255,255,255,.35); overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,.08); }
  .axis-fill { position: absolute; inset: 0 auto 0 0; border-radius: 999px; background: linear-gradient(90deg, rgba(58,164,204,.95), rgba(255,206,102,.85)); }
  .axis-score { margin-top: 5px; font-size: 11px; color: rgba(20,58,80,.62); text-align: right; }
  .compat-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; margin-top: 18px; }
  .compat-card { margin-top: 0; }
  .detail-list, .compat-list { display: grid; gap: 10px; }
  .detail-item, .compat-item { background: rgba(255,255,255,.28); border: 1px solid rgba(255,255,255,.26); border-radius: 16px; padding: 14px 16px; color: #17394f; line-height: 1.7; }
  .detail-item::before { content: "•"; margin-right: 8px; color: rgba(58,164,204,.9); }
  .compat-item strong { display: block; margin-bottom: 6px; color: #123247; font-size: 14px; }
  .compat-item small { display: block; margin-top: 6px; color: rgba(20,58,80,.75); }
  .share-section { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; }
  .share-btn { appearance: none; border: none; border-radius: 999px; padding: 14px 20px; font-size: 14px; font-weight: 700; letter-spacing: .04em; color: #fff; cursor: pointer; box-shadow: 0 10px 24px rgba(11,17,24,.18); transition: transform .2s ease, opacity .2s ease; }
  .share-btn:hover { transform: translateY(-1px); opacity: .92; }
  .share-btn:active { transform: translateY(0); }
  .share-btn.x { background: linear-gradient(135deg, #0b1118, #283746); }
  .share-btn.line { background: linear-gradient(135deg, #06C755, #05a948); }
  .share-btn.instagram { background: linear-gradient(135deg, #f09433, #e6683c 30%, #dc2743 60%, #bc1888); }
  .share-btn.save { background: linear-gradient(135deg, #3ba4cc, #1a3a50); }
  #share-status { width: 100%; margin-top: 6px; font-size: 12px; color: rgba(255,255,255,.72); text-align: center; min-height: 1.2em; }

  .share-card-canvas { position: fixed; left: -99999px; top: 0; width: 1080px; height: 1350px; pointer-events: none; }
  .share-card-stage { width: 1080px; height: 1350px; position: relative; overflow: hidden; font-family: 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif; background: linear-gradient(180deg, #B8EDF5 0%, #8DDCEE 18%, #5BBFDF 42%, #3BA4CC 68%, #2A8CB8 100%); }
  .share-card-stage * { box-sizing: border-box; }
  .share-card-bubble { position: absolute; border-radius: 999px; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.22); }
  .share-card-shell { position: absolute; inset: 70px; border-radius: 48px; background: rgba(255,255,255,.20); border: 1px solid rgba(255,255,255,.45); backdrop-filter: blur(0px); padding: 68px 64px; }
  .share-card-brand { font-size: 34px; font-weight: 800; color: rgba(255,255,255,.94); letter-spacing: .20em; text-transform: uppercase; }
  .share-card-sub { margin-top: 14px; font-size: 22px; color: rgba(255,255,255,.82); letter-spacing: .10em; }
  .share-card-code { display: inline-flex; margin-top: 42px; padding: 10px 18px; border-radius: 999px; background: rgba(255,255,255,.24); border: 1px solid rgba(255,255,255,.48); color: rgba(255,255,255,.92); font-size: 22px; letter-spacing: .30em; font-weight: 700; }
  .share-card-emoji { margin-top: 54px; font-size: 160px; line-height: 1; filter: drop-shadow(0 18px 28px rgba(26,58,80,.18)); }
  .share-card-name { margin-top: 26px; font-size: 72px; line-height: 1.15; font-weight: 900; letter-spacing: -.03em; color: #fff; }
  .share-card-en { margin-top: 18px; font-size: 28px; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.88); }
  .share-card-tagline { margin-top: 34px; font-size: 36px; line-height: 1.6; color: #17394f; font-weight: 700; background: rgba(255,255,255,.70); border-radius: 28px; padding: 28px 34px; }
  .share-card-bar-wrap { margin-top: 44px; display: grid; gap: 18px; }
  .share-card-axis { background: rgba(255,255,255,.26); border: 1px solid rgba(255,255,255,.38); border-radius: 24px; padding: 18px 22px; }
  .share-card-axis-head { display: flex; justify-content: space-between; font-size: 22px; color: #17394f; font-weight: 700; margin-bottom: 10px; }
  .share-card-meter { height: 18px; border-radius: 999px; background: rgba(255,255,255,.42); overflow: hidden; position: relative; }
  .share-card-fill { position: absolute; inset: 0 auto 0 0; border-radius: 999px; background: linear-gradient(90deg, rgba(58,164,204,.95), rgba(255,206,102,.92)); }
  .share-card-footer { position: absolute; left: 64px; right: 64px; bottom: 58px; display: flex; justify-content: space-between; align-items: center; color: rgba(255,255,255,.88); font-size: 22px; letter-spacing: .08em; }
  .share-card-hash { font-weight: 700; }
  @media (max-width: 780px) {
    .compat-grid { grid-template-columns: 1fr; }
    .axis-bar { grid-template-columns: 56px 1fr 56px; gap: 8px; }
  }

</style>
</head>
<body>

<!-- ── Fixed decoration layer ── -->
<div id="deco-layer">
  <!-- Blueprint grid -->
  <svg width="100%" height="100%" style="position:absolute;top:0;left:0;opacity:.07">
    <defs>
      <pattern id="sg" width="24" height="24" patternUnits="userSpaceOnUse">
        <path d="M24 0L0 0 0 24" fill="none" stroke="rgba(255,255,255,.8)" stroke-width=".4"/>
      </pattern>
      <pattern id="lg" width="120" height="120" patternUnits="userSpaceOnUse">
        <rect width="120" height="120" fill="url(#sg)"/>
        <path d="M120 0L0 0 0 120" fill="none" stroke="rgba(255,255,255,1)" stroke-width=".8"/>

(function initDeco() {
  const layer = document.getElementById('deco-layer');
  const bubbleColors = [
    "rgba(180,235,248,","rgba(140,215,240,","rgba(200,240,252,",
    "rgba(255,235,140,","rgba(160,225,245,","rgba(210,245,252,"

  for (let i = 0; i < 22; i++) {
    const size = 8 + Math.random() * 40;
    const left = Math.random() * 100;
    const delay = Math.random() * 10;
    const dur = 6 + Math.random() * 10;
    const op = 0.15 + Math.random() * 0.25;
    const col = bubbleColors[i % bubbleColors.length];
    const b = document.createElement('div');
    b.className = 'bubble';
    Object.assign(b.style, {
      width: size+'px', height: size+'px',
      bottom: -size+'px', left: left+'%',
      border: `1.5px solid ${col}${op*2})`,
      background: `${col}${op})`,
      animationDuration: dur+'s',
      animationDelay: delay+'s'
    });
    layer.appendChild(b);
  }
  const fishArr = ['🐠','🐡','🐟','🦐','🦀','🐙'];
  for (let i = 0; i < 5; i++) {
    const top = 10 + Math.random() * 75;
    const delay = Math.random() * 15;
    const dur = 20 + Math.random() * 20;
    const sz = 18 + Math.random() * 16;
    const f = document.createElement('div');
    f.className = 'fish';
    f.textContent = fishArr[i % fishArr.length];
    Object.assign(f.style, {
      top: top+'%', left: '-60px', fontSize: sz+'px',
      opacity: 0.18 + Math.random()*0.12,
      animationDuration: dur+'s', animationDelay: delay+'s'
    });
    layer.appendChild(f);
  }
})();

// ── Quiz logic ────────────────────────────────────────────
function startQuiz() {
  document.getElementById('page-intro').style.display = 'none';
  document.getElementById('page-quiz').style.display = 'flex';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('q-label').textContent = `Q.${currentQ+1}`;
  document.getElementById('q-text-a').textContent = q.A;
  document.getElementById('q-text-b').textContent = q.B;
  document.getElementById('quiz-counter').textContent =
    String(currentQ+1).padStart(2,'0') + ' / ' + String(questions.length).padStart(2,'0');
  document.getElementById('progress-fill').style.width =
    ((currentQ+1)/questions.length*100) + '%';
  document.getElementById('btn-back').disabled = currentQ === 0;

  // restore previous answer if exists
  selectedVal = answers[currentQ] !== undefined ? answers[currentQ] : null;
  updateOptStyles();

  const isLast = currentQ === questions.length - 1;
  document.getElementById('btn-next').textContent = isLast ? '診断結果を見る →' : '次の質問 →';
}

function selectOpt(val) {
  selectedVal = val;
  updateOptStyles();
}

function updateOptStyles() {
  const classes = ['selected-a1','selected-a2','selected-b2','selected-b1'];
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById('opt'+i);
    btn.className = 'opt-btn' + (selectedVal === i ? ' '+classes[i] : '');
    // rebuild dot
    btn.querySelector('.opt-dot').style.background =
      selectedVal === i
        ? (i < 2 ? 'rgba(0,140,200,.6)' : 'rgba(200,140,0,.6)')
        : 'rgba(0,100,160,.3)';
  }
  const nextBtn = document.getElementById('btn-next');
  nextBtn.classList.toggle('active', selectedVal !== null);
}

function nextQuestion() {
  if (selectedVal === null) return;
  answers[currentQ] = selectedVal;

  const card = document.getElementById('question-card');
  card.classList.add('slide-out');

  setTimeout(() => {
    card.classList.remove('slide-out');
    if (currentQ < questions.length - 1) {
      currentQ++;
      selectedVal = null;
      renderQuestion();
    } else {
      showResult();
    }
  }, 320);
}

function goBack() {
  if (currentQ === 0) return;
  currentQ--;
  selectedVal = answers[currentQ];
  renderQuestion();
}

// ── Scoring ───────────────────────────────────────────────
function getAnswerWeight(answerIndex) {
  return {
    aScore: answerIndex === 0 ? 2 : answerIndex === 1 ? 1 : 0,
    bScore: answerIndex === 3 ? 2 : answerIndex === 2 ? 1 : 0
  };
}

function calculateAxisScores() {
  const axisScores = {
    worldview: { a: 0, b: 0 },
    value: { a: 0, b: 0 },
    workstyle: { a: 0, b: 0 },
    process: { a: 0, b: 0 }
  };

  questions.forEach((question, index) => {
    const answer = answers[index];
    if (answer === undefined) return;

    const { aScore, bScore } = getAnswerWeight(answer);
    if (!axisScores[question.axis]) return;

    axisScores[question.axis].a += aScore;
    axisScores[question.axis].b += bScore;
  });

  return axisScores;
}

function getTypeCode(axisScores) {
  return AXES.map(axis => {
    const score = axisScores[axis.key];
    return score.a >= score.b ? axis.codeA : axis.codeB;
  }).join('');
}

function calculateResult() {
  const axisScores = calculateAxisScores();
  const code = getTypeCode(axisScores);
  return results[code] || results['VFCE'];
}


function renderAxisBars(axisScores) {
  const container = document.getElementById('axis-result');
  container.innerHTML = AXES.map(axis => {
    const a = axisScores[axis.key].a;
    const b = axisScores[axis.key].b;
    const total = a + b;
    const percent = total === 0 ? 50 : Math.round((a / total) * 100);
    return `
      <div class="axis-block">
        <div class="axis-title">${axis.label}</div>
        <div class="axis-bar">
          <div class="axis-left">${axis.nameA}</div>
          <div>
            <div class="axis-meter"><div class="axis-fill" style="width:${percent}%"></div></div>
            <div class="axis-score">${axis.codeA} ${a} : ${b} ${axis.codeB}</div>
          </div>
          <div class="axis-right">${axis.nameB}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderDetailList(items, targetId) {
  document.getElementById(targetId).innerHTML = items
    .map(item => `<div class="detail-item">${item}</div>`)
    .join('');
}

function parseCompatibilityItem(text) {
  const cleaned = text.trim();
  const match = cleaned.match(/^・?([^：]+)：\s*(.+)$/);
  if (!match) return { title: cleaned, body: '', note: '' };
  const rest = match[2].split(' | 解決策：');
  return {
    title: match[1].trim(),
    body: rest[0].trim(),
    note: rest[1] ? `解決策：${rest[1].trim()}` : ''
  };
}

function renderCompatibility(items, targetId) {
  document.getElementById(targetId).innerHTML = items.map(item => {
    const parsed = parseCompatibilityItem(item);
    return `<div class="compat-item"><strong>${parsed.title}</strong><div>${parsed.body}</div>${parsed.note ? `<small>${parsed.note}</small>` : ''}</div>`;
  }).join('');
}

function buildShareText(result) {
  return `ARCHIme 建築タイプ診断

私のタイプは ${result.emoji} ${result.creature} (${result.code})
${result.tagline}

#ARCHIme #建築タイプ診断`;
}


function setShareStatus(message) {
  const el = document.getElementById('share-status');
  if (el) el.textContent = message || '';
}

function buildLineShareText(result) {
  return `ARCHIme 建築タイプ診断
${result.emoji} ${result.creature} (${result.code})
${result.tagline}`;
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function createShareCardMarkup(result, axisScores) {
  const bubbleMarkup = [
    { left: 70, top: 100, size: 90 },
    { left: 930, top: 140, size: 58 },
    { left: 120, top: 1080, size: 42 },
    { left: 900, top: 1020, size: 110 },
    { left: 860, top: 300, size: 36 }
  ].map(b => `<div class="share-card-bubble" style="left:${b.left}px;top:${b.top}px;width:${b.size}px;height:${b.size}px;"></div>`).join('');

  const axisMarkup = AXES.map(axis => {
    const score = axisScores[axis.key];
    const total = score.a + score.b;
    const percent = total === 0 ? 50 : Math.round((score.a / total) * 100);
    return `
      <div class="share-card-axis">
        <div class="share-card-axis-head"><span>${escapeHtml(axis.nameA)}</span><span>${escapeHtml(axis.nameB)}</span></div>
        <div class="share-card-meter"><div class="share-card-fill" style="width:${percent}%"></div></div>
      </div>`;
  }).join('');

  return `
    <div class="share-card-stage">
      ${bubbleMarkup}
      <div class="share-card-shell">
        <div class="share-card-brand">ARCHIme</div>
        <div class="share-card-sub">建築タイプ診断</div>
        <div class="share-card-code">${escapeHtml(result.code)}</div>
        <div class="share-card-emoji">${escapeHtml(result.emoji)}</div>
        <div class="share-card-name">${escapeHtml(result.creature)}</div>
        <div class="share-card-en">${escapeHtml(result.english)}</div>
        <div class="share-card-tagline">${escapeHtml(result.tagline)}</div>
        <div class="share-card-bar-wrap">${axisMarkup}</div>
        <div class="share-card-footer">
          <div>あなたの建築タイプ結果</div>
          <div class="share-card-hash">#ARCHIme</div>
        </div>
      </div>
    </div>`;
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

async function exportElementToPng(element, width, height) {
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
      <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml" style="width:${width}px;height:${height}px;">${element.outerHTML}</div>
      </foreignObject>
    </svg>`;
  const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  try {
    const img = await loadImage(url);
    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    return new Promise((resolve) => {
      canvas.toBlob((blobOut) => resolve(blobOut), 'image/png');
    });
  } finally {
    URL.revokeObjectURL(url);
  }
}

async function generateShareImage(result, axisScores) {
  const host = document.getElementById('share-card-canvas');
  host.innerHTML = createShareCardMarkup(result, axisScores);
  const stage = host.firstElementChild;
  return exportElementToPng(stage, 1080, 1350);
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function setupShareButtons(result, axisScores) {
  const shareX = document.getElementById('share-x');
  const shareLine = document.getElementById('share-line');
  const shareInstagram = document.getElementById('share-instagram');
  const shareSave = document.getElementById('share-save');

  if (shareX) {
    shareX.onclick = () => {
      const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(buildShareText(result))}&url=${encodeURIComponent(window.location.href)}`;
      window.open(url, '_blank', 'noopener,noreferrer');
    };
  }

  if (shareLine) {
    shareLine.onclick = () => {
      const shareUrl = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(window.location.href)}`;
      window.open(shareUrl, '_blank', 'noopener,noreferrer');
      setShareStatus(`LINEで共有しやすいように、共有文の候補はこちらです。 ${buildLineShareText(result)}`);
    };
  }

  const saveHandler = async (isInstagram) => {
    try {
      setShareStatus(isInstagram ? 'Instagram用の画像を作成しています…' : '結果画像を作成しています…');
      const blob = await generateShareImage(result, axisScores);
      if (!blob) throw new Error('image generation failed');
      downloadBlob(blob, `ARCHIme-${result.code}.png`);
      setShareStatus(isInstagram ? '画像を保存しました。Instagramの投稿やストーリーズにそのまま使えます。' : '結果画像を保存しました。');
    } catch (error) {
      console.error(error);
      setShareStatus('画像の保存に失敗しました。別ブラウザでもう一度お試しください。');
    }
  };

  if (shareInstagram) shareInstagram.onclick = () => saveHandler(true);
  if (shareSave) shareSave.onclick = () => saveHandler(false);
}

const CHARACTER_IMAGE_CONFIG = {
  basePath: 'images/characters',
  extensions: ['png', 'webp', 'jpg', 'jpeg', 'svg']
};

function getCharacterImageCandidates(result) {
  const code = String(result.code || '').trim();
  const variants = [code.toLowerCase(), code.toUpperCase()];
  return CHARACTER_IMAGE_CONFIG.extensions.flatMap(ext =>
    variants.map(name => `${CHARACTER_IMAGE_CONFIG.basePath}/${name}.${ext}`)
  );
}

function renderResultVisual(result) {
  const resultVisual = document.getElementById('result-emoji');
  const candidates = getCharacterImageCandidates(result);

  if (!candidates.length) {
    resultVisual.textContent = result.emoji || '';
    return;
  }

  let candidateIndex = 0;
  const img = document.createElement('img');
  img.alt = result.creature || result.code || 'character image';
  img.className = 'result-character-image';

  img.onerror = () => {
    candidateIndex += 1;
    if (candidateIndex < candidates.length) {
      img.src = candidates[candidateIndex];
    } else {
      resultVisual.textContent = result.emoji || '';
    }
  };

  resultVisual.innerHTML = '';
  resultVisual.appendChild(img);
  img.src = candidates[candidateIndex];
}

// ── Result ────────────────────────────────────────────────
function showResult() {
  const r = calculateResult();
  const axisScores = calculateAxisScores();

  document.getElementById('page-quiz').style.display = 'none';
  document.getElementById('page-result').style.display = 'flex';

  renderResultVisual(r);
  document.getElementById('result-code-text').textContent = r.code.split('').join(' ');
  const nameEl = document.getElementById('result-name');
  nameEl.textContent = r.creature;
  nameEl.style.background = `linear-gradient(135deg, #1a3a50, ${r.color})`;
  nameEl.style.webkitBackgroundClip = 'text';
  nameEl.style.webkitTextFillColor = 'transparent';
  nameEl.style.backgroundClip = 'text';
  document.getElementById('result-en').textContent = r.english;
  document.getElementById('result-tagline').textContent = r.tagline;
  document.getElementById('result-desc').textContent = r.description;

  renderAxisBars(axisScores);

  document.getElementById('result-strengths').innerHTML =
    r.strengths.map(s=>`<div class="sw-item"><span>▲</span><span class="sw-item-text">${s}</span></div>`).join('');
  document.getElementById('result-weaknesses').innerHTML =
    r.weaknesses.map(s=>`<div class="sw-item"><span>▼</span><span class="sw-item-text">${s}</span></div>`).join('');
  document.getElementById('result-anecdotes').innerHTML =
    r.archi_anecdotes.map(a=>`<div class="anecdote-item">・${a}</div>`).join('');
  document.getElementById('result-career').innerHTML =
    r.career.map(c=>`<div class="career-tag">${c}</div>`).join('');
  renderDetailList(r.group_role, 'result-group-role');
  renderDetailList(r.work_scene, 'result-work-scene');
  renderCompatibility(r.compatibility_good, 'result-compat-good');
  renderCompatibility(r.compatibility_bad, 'result-compat-bad');

  setupShareButtons(r, axisScores);

  setTimeout(() => {
    document.getElementById('result-page').classList.add('visible');
  }, 80);
}

function restart() {
  currentQ = 0; answers = {}; selectedVal = null;
  document.getElementById('result-page').classList.remove('visible');
  document.getElementById('page-result').style.display = 'none';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('page-intro').style.display = 'flex';
}
</script>
